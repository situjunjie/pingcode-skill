name: Publish Package to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - name: Check package version
        id: package
        shell: bash
        run: |
          PACKAGE_NAME="$(npm pkg get name --workspaces=false | tr -d '"')"
          PACKAGE_VERSION="$(npm pkg get version --workspaces=false | tr -d '"')"
          PUBLISHED_VERSION="$(npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version 2>/dev/null || true)"

          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package contents
        if: steps.package.outputs.publish == 'true'
        run: npm run pack:check

      - name: Run tests
        if: steps.package.outputs.publish == 'true'
        run: npm test

      - name: Publish package
        if: steps.package.outputs.publish == 'true'
        run: npm publish --access public
